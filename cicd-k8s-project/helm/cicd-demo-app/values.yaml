# ──────────────────────────────────────────────
# Image — updated automatically by CD pipeline
# ──────────────────────────────────────────────
image:
  repository: <YOUR_ECR_URI>/cicd-demo-app   # replaced by CD workflow
  tag: "latest"                               # replaced by CD workflow
  pullPolicy: IfNotPresent

# ──────────────────────────────────────────────
# Deployment
# ──────────────────────────────────────────────
replicaCount: 2

nameOverride: ""
fullnameOverride: ""

# ──────────────────────────────────────────────
# Application config
# ──────────────────────────────────────────────
app:
  port: 3000
  env: production

env:
  - name: PORT
    value: "3000"
  - name: APP_ENV
    value: "production"
  - name: NODE_ENV
    value: "production"

# ──────────────────────────────────────────────
# Service — AWS NLB / ALB
# ──────────────────────────────────────────────
service:
  type: LoadBalancer
  port: 80
  targetPort: 3000
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

# ──────────────────────────────────────────────
# Resources (keep small for demo)
# ──────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

# ──────────────────────────────────────────────
# Health probes
# ──────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

# ──────────────────────────────────────────────
# Autoscaling (HPA)
# ──────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# ──────────────────────────────────────────────
# Rolling update strategy
# ──────────────────────────────────────────────
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# ──────────────────────────────────────────────
# Pod disruption budget
# ──────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ──────────────────────────────────────────────
# Service Account
# ──────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ──────────────────────────────────────────────
# Security context
# ──────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
